<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
.slidecontainer {
  width: 70%;
}

.slider {
  -webkit-appearance: none;
  width: 90%;
  height: 10px;
  border-radius: 5px;
  background: #d3d3d3;
  outline: none;
  opacity: 0.7;
  -webkit-transition: .2s;
  transition: opacity .2s;
}

.slider:hover {
  opacity: 1;
}

.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 25px;
  height: 25px;
  background: #4CAF50;
  cursor: pointer;
  border-radius: 50%;
}

.slider::-moz-range-thumb {
  width: 25px;
  height: 25px;
  background: #4CAF50;
  cursor: pointer;
}
</style>
</head>
<body>

<center>
<h1>Keyval Param Control</h1>

<div class="slidecontainer">
  <input type="range" min="2" max="32" step="1" value="8" class="slider"
         id="base1" oninput="update(this)" onpageshow="update(this)">
  <p>Numeric base: <span id="base1_val">2</span></p>
</div>

<div class="slidecontainer">
  <input type="range" min="1" max="128" step="1" value="31" class="slider"
         id="mul1" oninput="update(this)">
  <p>Multiplier: <span id="mul1_val">31</span></p>
</div>

<div class="slidecontainer">
  <input type="range" min="5" max="32" step="1" value="14" class="slider"
         id="wr1" oninput="update(this)">
  <p>Wrap (modulus): <span id="wr1_val">14</span></p>
</div>

<div class="slidecontainer">
  <input type="range" min="1" max="257" step="1" value="47" class="slider"
         id="div1" oninput="update(this)">
  <p>Divide (denominator): <span id="div1_val">47</span></p>
</div>

<div class="slidecontainer">
  <input type="range" min="1.0" max="2.0" step="0.001" value="1.727" class="slider"
         id="chaos1" oninput="update(this)">
  <p>Chaos: <span id="chaos1_val">1.727</span></p>
</div>

<div class="slidecontainer">
  <input type="range" min="-17" max="17" step="1" value="0" class="slider"
         id="md1" oninput="update(this)">
  <p>Mode offset: <span id="md1_val">0</span></p>
</div>

<div class="slidecontainer">
  <input type="range" min="1" max="64" step="1" value="16" class="slider"
         id="eun1" oninput="update(this)">
  <p>Euclid numerator: <span id="eun1_val">16</span></p>
</div>

<div class="slidecontainer">
  <input type="range" min="1" max="64" step="1" value="6" class="slider"
         id="eud1" oninput="update(this)">
  <p>Euclid denominator: <span id="eud1_val">6</span></p>
</div>


<div class="slidecontainer">
  <input type="range" min="0.00" max="1.00" step="0.01" value="0.1" class="slider"
         id="gt1" oninput="update(this)">
  <p>MIDI gate length: <span id="gt1_val">0.1</span></p>
</div>
</center>

<script>
function update(object) {
  object_id = object.id
  object_val = object.value
  val_id = object.id + "_val"
  document.getElementById(val_id).innerHTML = object_val;
  var xhttp = new XMLHttpRequest();
  xhttp.open("GET", "/send_value?" + object_id + "=" + object_val, true);
  xhttp.send();
}
</script>

</body>
</html>
